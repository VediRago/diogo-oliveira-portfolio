<svg xmlns="http://www.w3.org/2000/svg" width="856" height="1536" viewBox="0 0 856 1536">
  <rect width="856" height="1536" fill="#ffffff"/>
  <text x="52" y="90" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#b8b8b8">May 20 15:56  |  661 characters</text>
  <text x="52" y="180" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#222222">🧠 CORE SYSTEM (LOCKED)</text>
  <text x="52" y="250" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Experience exists because identity is fragmented</text>
  <text x="52" y="315" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">across states. Fragmentation creates difference,</text>
  <text x="52" y="380" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">and difference allows change. Change is what</text>
  <text x="52" y="445" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">makes experience possible.</text>
  <text x="52" y="535" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Unity is the temporary collapse of fragmentation</text>
  <text x="52" y="600" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">into coherence. It produces meaning,</text>
  <text x="52" y="665" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">connection, and emotional completion—but it</text>
  <text x="52" y="730" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">removes internal difference, which makes</text>
  <text x="52" y="795" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">sustained experience unstable.</text>
  <text x="52" y="885" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">When unity becomes stable enough, the system</text>
  <text x="52" y="950" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">cannot maintain experience in that state. It</text>
  <text x="52" y="1015" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">restores fragmentation so experience can</text>
  <text x="52" y="1080" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">continue.</text>
  <text x="52" y="1180" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#222222">🔁 CYCLE RULE</text>
  <text x="52" y="1250" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Fragmentation → enables experience</text>
  <text x="52" y="1315" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Experience → produces connection</text>
  <text x="52" y="1380" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Connection → trends toward unity</text>
  <text x="52" y="1445" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Unity → creates instability in experience</text>
  <text x="52" y="1510" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333333">Instability → triggers re-fragmentation</text>
</svg>